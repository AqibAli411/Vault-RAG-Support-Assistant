services:
  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: vault-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
    container_name: vault-backend
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
    container_name: vault-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8001
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  chroma_data:
